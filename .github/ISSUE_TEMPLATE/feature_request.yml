name: Feature Request
description: Suggest a new page, chart, or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Got an idea? We'd love to hear it!

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - League — Dashboard
        - League — Standings
        - League — League Insights
        - League — Head-to-Head
        - League — Point Sources
        - League — Transfer Analysis
        - League — Captain Picks
        - League — Player Ownership
        - Global — Season Stats
        - Global — Player Rankings
        - Global — Global Transfers
        - Global — Global Ownership
        - New page
        - UI / Design
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What should it do? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?
